    function randomize() {
      updateState(randomizedStatePatch(), "Pattern randomized.");
    }

    function randomizedStatePatch(seed = Date.now() % 1000000) {
      const random = seeded(seed);
      const loopOptions = ANIMATION_PRESETS.filter((preset) => preset.key !== "none");
      return {
        seed: Math.floor(random() * 90000) + 1000,
        rotation: Math.round(random() * 360 - 180),
        angle: Math.round(random() * 120 - 60),
        spiralPosition: Math.round(random() * 120 - 60),
        characterBend: Math.round(random() * 70 - 35),
        jitter: Math.round(random() * 60),
        cloneCount: Math.round(48 + random() * 100),
        spiralCount: Math.round(2 + random() * 6),
        innerRadius: Math.round(24 + random() * 180),
        outerRadius: Math.round(320 + random() * 520),
        animationPreset: loopOptions[Math.floor(random() * loopOptions.length)].key,
        animationSpeed: Math.round(70 + random() * 110),
        animationAmount: Math.round(28 + random() * 58)
      };
    }

    function animationExportSettings(format = document.getElementById("exportFormat").value) {
      const sourceSize = getCanvasSize();
      const widthValue = document.getElementById("exportLoopWidth").value;
      const renderWidth = widthValue === "source" ? sourceSize.width : Number(widthValue);
      const scale = renderWidth / sourceSize.width;
      const targetFps = Number(document.getElementById("exportLoopFps").value) || 12;
      const duration = animationDurationSeconds();
      const playbackDuration = ["apng", "gif", "lottie"].includes(format) ? Math.min(duration, 4) : duration;
      const targetFrameCount = Math.max(2, Math.round(playbackDuration * targetFps));
      const rasterFrameLimit = format === "apng" || format === "gif" ? 240 : targetFrameCount;
      const frameCount = Math.min(targetFrameCount, rasterFrameLimit);
      const effectiveFps = frameCount / playbackDuration;
      return {
        sourceSize,
        scale,
        width: Math.round(sourceSize.width * scale),
        height: Math.round(sourceSize.height * scale),
        fps: targetFps,
        effectiveFps,
        duration,
        playbackDuration,
        frameCount
      };
    }

    async function exportAsset() {
      const format = document.getElementById("exportFormat").value;
      if (format === "svg") {
        await exportSvg();
        return;
      }
      if (format === "png") {
        await exportPng();
        return;
      }
      if (format === "jpg") {
        await exportJpg();
        return;
      }
      if (format === "lottie") {
        await exportLottie();
        return;
      }
      await exportLoop(format);
    }

    async function exportLoop(format = document.getElementById("exportFormat").value) {
      const settings = animationExportSettings(format);
      const button = document.getElementById("exportAsset");
      button.disabled = true;
      notice.textContent = `Rendering ${settings.frameCount} frames...`;
      try {
        await document.fonts.ready;
      } catch {}

      try {
        let blob;
        let extension = format;
        if (format === "apng") {
          const frames = await renderApngLoopFrames(settings, (done, total) => {
            notice.textContent = `Rendering APNG ${done}/${total} frames...`;
          });
          blob = await encodeApng(frames, settings.playbackDuration);
          extension = "png";
        } else if (format === "gif") {
          blob = await encodeGifLoop(settings, (done, total) => {
            notice.textContent = `Rendering GIF ${done}/${total} frames...`;
          });
        } else {
          const video = await recordVideoLoop(format, settings, (done, total) => {
            notice.textContent = `Recording video ${done}/${total} frames...`;
          });
          blob = video.blob;
          extension = video.extension;
        }

        downloadBlob(blob, safeName(extension, "loop"));
        const frameNote = settings.effectiveFps !== settings.fps ? ` · ${settings.frameCount} frames` : "";
        notice.textContent = `${extension.toUpperCase()} loop exported at ${settings.width} × ${settings.height}, ${settings.fps} fps${frameNote}.`;
      } catch (error) {
        notice.textContent = error && error.message ? error.message : "Loop export failed.";
      } finally {
        button.disabled = false;
      }
    }

    async function renderPngLoopFrames(settings, onProgress) {
      const canvas = document.createElement("canvas");
      const frames = [];
      for (let i = 0; i < settings.frameCount; i += 1) {
        drawCanvasFrame(canvas, settings.scale, settings.sourceSize, i / settings.frameCount);
        frames.push(await canvasToBlob(canvas, "image/png"));
        if (onProgress) onProgress(i + 1, settings.frameCount);
        if (i % 8 === 0) await nextFrame();
      }
      return frames;
    }

    async function renderApngLoopFrames(settings, onProgress) {
      const canvas = document.createElement("canvas");
      const frames = [];
      for (let i = 0; i < settings.frameCount; i += 1) {
        drawCanvasFrame(canvas, settings.scale, settings.sourceSize, i / settings.frameCount);
        if (i === 0) {
          frames.push({ blob: await canvasToBlob(canvas, "image/png"), x: 0, y: 0, width: canvas.width, height: canvas.height });
        } else {
          frames.push(await croppedPngFrame(canvas));
        }
        if (onProgress) onProgress(i + 1, settings.frameCount);
        if (i % 8 === 0) await nextFrame();
      }
      return frames;
    }

    async function croppedPngFrame(sourceCanvas) {
      const ctx = sourceCanvas.getContext("2d");
      const image = ctx.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
      const bounds = contentBounds(image.data, sourceCanvas.width, sourceCanvas.height);
      if (!bounds) {
        const empty = document.createElement("canvas");
        empty.width = 1;
        empty.height = 1;
        return { blob: await canvasToBlob(empty, "image/png"), x: 0, y: 0, width: 1, height: 1 };
      }
      const cropCanvas = document.createElement("canvas");
      cropCanvas.width = bounds.width;
      cropCanvas.height = bounds.height;
      const cropCtx = cropCanvas.getContext("2d");
      cropCtx.putImageData(ctx.getImageData(bounds.x, bounds.y, bounds.width, bounds.height), 0, 0);
      return {
        blob: await canvasToBlob(cropCanvas, "image/png"),
        x: bounds.x,
        y: bounds.y,
        width: bounds.width,
        height: bounds.height
      };
    }

    async function encodeGifLoop(settings, onProgress) {
      const canvas = document.createElement("canvas");
      const parts = [];
      const delayCs = Math.max(1, Math.round(settings.playbackDuration * 100 / settings.frameCount));
      const palette = gifAdaptivePalette();

      parts.push(asciiBytes("GIF89a"));
      parts.push(u16le(settings.width), u16le(settings.height));
      parts.push(Uint8Array.from([0xf7, 0, 0]));
      parts.push(palette);
      parts.push(Uint8Array.from([0x21, 0xff, 0x0b]));
      parts.push(asciiBytes("NETSCAPE2.0"));
      parts.push(Uint8Array.from([0x03, 0x01, 0x00, 0x00, 0x00]));

      for (let i = 0; i < settings.frameCount; i += 1) {
        drawCanvasFrame(canvas, settings.scale, settings.sourceSize, i / settings.frameCount);
        const data = canvas.getContext("2d").getImageData(0, 0, settings.width, settings.height).data;
        const indexed = adaptiveIndexPixels(data, palette);
        const cropped = cropIndexedFrame(indexed, settings.width, settings.height);
        const compressed = lzwEncodeLiteral(cropped.indices, 8);
        parts.push(Uint8Array.from([0x21, 0xf9, 0x04, 0x08]), u16le(delayCs), Uint8Array.from([0x00, 0x00]));
        parts.push(Uint8Array.from([0x2c]), u16le(cropped.x), u16le(cropped.y), u16le(cropped.width), u16le(cropped.height), Uint8Array.from([0x00, 0x08]));
        parts.push(gifSubBlocks(compressed));
        if (onProgress) onProgress(i + 1, settings.frameCount);
        if (i % 4 === 0) await nextFrame();
      }

      parts.push(Uint8Array.from([0x3b]));
      return new Blob(parts, { type: "image/gif" });
    }

    async function recordVideoLoop(format, settings, onProgress) {
      const videoType = supportedVideoType(format);
      if (!videoType) {
        throw new Error("MP4 export is not supported by this browser.");
      }

      const canvas = document.createElement("canvas");
      const stream = canvas.captureStream(settings.fps);
      const chunks = [];
      const recorder = new MediaRecorder(stream, {
        mimeType: videoType.mime,
        videoBitsPerSecond: Math.max(3500000, settings.width * settings.height * settings.fps * .16)
      });
      recorder.addEventListener("dataavailable", (event) => {
        if (event.data && event.data.size) chunks.push(event.data);
      });
      const stopped = new Promise((resolve) => recorder.addEventListener("stop", resolve, { once: true }));
      drawCanvasFrame(canvas, settings.scale, settings.sourceSize, 0);
      recorder.start();
      const frameMs = 1000 / settings.fps;
      for (let i = 0; i < settings.frameCount; i += 1) {
        drawCanvasFrame(canvas, settings.scale, settings.sourceSize, i / settings.frameCount);
        if (onProgress) onProgress(i + 1, settings.frameCount);
        await sleep(frameMs);
      }
      recorder.stop();
      await stopped;
      stream.getTracks().forEach((track) => track.stop());
      return { blob: new Blob(chunks, { type: videoType.mime }), extension: videoType.extension };
    }

    function supportedVideoType(format) {
      if (typeof MediaRecorder === "undefined") return null;
      if (format !== "mp4") return null;
      const options = [
        "video/mp4;codecs=avc1.64001F",
        "video/mp4;codecs=avc1.42E01E",
        "video/mp4"
      ];
      const mime = options.find((item) => MediaRecorder.isTypeSupported(item));
      return mime ? { mime, extension: "mp4" } : null;
    }

    function syncVideoExportSupport() {
      if (document.getElementById("exportFormat").value === "mp4" && !supportedVideoType("mp4")) {
        notice.textContent = "MP4 export may be unavailable in this browser.";
      }
      syncExportControls();
    }

    function syncExportControls() {
      const format = document.getElementById("exportFormat").value;
      const isAnimated = ["apng", "gif", "lottie", "mp4"].includes(format);
      document.querySelector('[data-export-control="scale"]').classList.toggle("hidden", !["png", "jpg"].includes(format));
      document.querySelector('[data-export-control="width"]').classList.toggle("hidden", !isAnimated);
      document.querySelector('[data-export-control="fps"]').classList.toggle("hidden", !isAnimated);
      document.getElementById("exportAsset").textContent = "Export";
    }

    function canvasToBlob(canvas, type, quality) {
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) resolve(blob);
          else reject(new Error("Frame encoding failed."));
        }, type, quality);
      });
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function nextFrame() {
      return new Promise((resolve) => requestAnimationFrame(resolve));
    }

    async function encodeApng(frameBlobs, duration) {
      const parsed = [];
      for (const frame of frameBlobs) {
        const blob = frame.blob || frame;
        parsed.push({ ...frame, ...parsePng(new Uint8Array(await blob.arrayBuffer())) });
      }

      const first = parsed[0];
      const ihdr = first.chunks.find((chunk) => chunk.type === "IHDR");
      if (!ihdr) throw new Error("APNG export failed: invalid PNG frame.");
      const width = readU32(ihdr.data, 0);
      const height = readU32(ihdr.data, 4);
      const preIdat = first.chunks.filter((chunk) => !["IHDR", "IDAT", "IEND"].includes(chunk.type));
      const parts = [PNG_SIGNATURE, pngChunk("IHDR", ihdr.data)];
      const actl = new Uint8Array(8);
      writeU32(actl, 0, parsed.length);
      writeU32(actl, 4, 0);
      parts.push(pngChunk("acTL", actl));
      preIdat.forEach((chunk) => parts.push(pngChunk(chunk.type, chunk.data)));

      let sequence = 0;
      parsed.forEach((frame, index) => {
        const frameIhdr = frame.chunks.find((chunk) => chunk.type === "IHDR");
        const frameWidth = frame.width || (frameIhdr ? readU32(frameIhdr.data, 0) : width);
        const frameHeight = frame.height || (frameIhdr ? readU32(frameIhdr.data, 4) : height);
        const fctl = new Uint8Array(26);
        writeU32(fctl, 0, sequence);
        sequence += 1;
        writeU32(fctl, 4, frameWidth);
        writeU32(fctl, 8, frameHeight);
        writeU32(fctl, 12, frame.x || 0);
        writeU32(fctl, 16, frame.y || 0);
        const delayMs = Math.max(1, Math.round(duration * 1000 / parsed.length));
        writeU16(fctl, 20, delayMs);
        writeU16(fctl, 22, 1000);
        fctl[24] = 1;
        fctl[25] = 0;
        parts.push(pngChunk("fcTL", fctl));
        frame.chunks.filter((chunk) => chunk.type === "IDAT").forEach((chunk) => {
          if (index === 0) {
            parts.push(pngChunk("IDAT", chunk.data));
            return;
          }
          const fdat = new Uint8Array(chunk.data.length + 4);
          writeU32(fdat, 0, sequence);
          sequence += 1;
          fdat.set(chunk.data, 4);
          parts.push(pngChunk("fdAT", fdat));
        });
      });
      parts.push(pngChunk("IEND", new Uint8Array(0)));
      return new Blob(parts, { type: "image/apng" });
    }

    const PNG_SIGNATURE = Uint8Array.from([137, 80, 78, 71, 13, 10, 26, 10]);

    function parsePng(bytes) {
      for (let i = 0; i < PNG_SIGNATURE.length; i += 1) {
        if (bytes[i] !== PNG_SIGNATURE[i]) throw new Error("APNG export failed: invalid PNG data.");
      }
      const chunks = [];
      let offset = PNG_SIGNATURE.length;
      while (offset < bytes.length) {
        const length = readU32(bytes, offset);
        const type = asciiFromBytes(bytes.subarray(offset + 4, offset + 8));
        const data = bytes.slice(offset + 8, offset + 8 + length);
        chunks.push({ type, data });
        offset += 12 + length;
        if (type === "IEND") break;
      }
      return { chunks };
    }

    function pngChunk(type, data) {
      const typeBytes = asciiBytes(type);
      const chunk = new Uint8Array(data.length + 12);
      writeU32(chunk, 0, data.length);
      chunk.set(typeBytes, 4);
      chunk.set(data, 8);
      writeU32(chunk, data.length + 8, crc32(concatBytes([typeBytes, data])));
      return chunk;
    }

    function gifAdaptivePalette() {
      const palette = new Uint8Array(256 * 3);
      const bg = hexToRgb(editorState.bgColor);
      const fill = hexToRgb(editorState.fillColor);
      for (let i = 0; i < 128; i += 1) {
        const t = i / 127;
        palette[i * 3] = Math.round(bg.r + (fill.r - bg.r) * t);
        palette[i * 3 + 1] = Math.round(bg.g + (fill.g - bg.g) * t);
        palette[i * 3 + 2] = Math.round(bg.b + (fill.b - bg.b) * t);
      }
      for (let i = 128; i < 256; i += 1) {
        const t = (i - 128) / 127;
        const value = Math.round(t * 255);
        palette[i * 3] = value;
        palette[i * 3 + 1] = value;
        palette[i * 3 + 2] = value;
      }
      return palette;
    }

    function adaptiveIndexPixels(data, palette) {
      const indexed = new Uint8Array(data.length / 4);
      for (let i = 0, p = 0; i < data.length; i += 4, p += 1) {
        indexed[p] = nearestPaletteIndex(data[i], data[i + 1], data[i + 2], palette);
      }
      return indexed;
    }

    function cropIndexedFrame(indexed, width, height) {
      let minX = width;
      let minY = height;
      let maxX = -1;
      let maxY = -1;
      for (let y = 0; y < height; y += 1) {
        const row = y * width;
        for (let x = 0; x < width; x += 1) {
          if (indexed[row + x] === 0) continue;
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
      if (maxX < minX || maxY < minY) {
        return { x: 0, y: 0, width: 1, height: 1, indices: Uint8Array.from([0]) };
      }

      const padding = 2;
      minX = Math.max(0, minX - padding);
      minY = Math.max(0, minY - padding);
      maxX = Math.min(width - 1, maxX + padding);
      maxY = Math.min(height - 1, maxY + padding);
      const cropWidth = maxX - minX + 1;
      const cropHeight = maxY - minY + 1;
      const crop = new Uint8Array(cropWidth * cropHeight);
      for (let y = 0; y < cropHeight; y += 1) {
        const sourceStart = (minY + y) * width + minX;
        crop.set(indexed.subarray(sourceStart, sourceStart + cropWidth), y * cropWidth);
      }
      return { x: minX, y: minY, width: cropWidth, height: cropHeight, indices: crop };
    }

    function contentBounds(data, width, height) {
      let minX = width;
      let minY = height;
      let maxX = -1;
      let maxY = -1;
      const bg = hexToRgb(editorState.bgColor);
      for (let y = 0; y < height; y += 1) {
        const row = y * width * 4;
        for (let x = 0; x < width; x += 1) {
          const offset = row + x * 4;
          const dr = Math.abs(data[offset] - bg.r);
          const dg = Math.abs(data[offset + 1] - bg.g);
          const db = Math.abs(data[offset + 2] - bg.b);
          if (dr + dg + db < 18) continue;
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
      if (maxX < minX || maxY < minY) return null;
      const padding = 3;
      minX = Math.max(0, minX - padding);
      minY = Math.max(0, minY - padding);
      maxX = Math.min(width - 1, maxX + padding);
      maxY = Math.min(height - 1, maxY + padding);
      return { x: minX, y: minY, width: maxX - minX + 1, height: maxY - minY + 1 };
    }

    function nearestPaletteIndex(r, g, b, palette) {
      let bestIndex = 0;
      let bestDistance = Infinity;
      for (let i = 0; i < 256; i += 1) {
        const offset = i * 3;
        const dr = r - palette[offset];
        const dg = g - palette[offset + 1];
        const db = b - palette[offset + 2];
        const distance = dr * dr + dg * dg + db * db;
        if (distance >= bestDistance) continue;
        bestDistance = distance;
        bestIndex = i;
        if (distance === 0) break;
      }
      return bestIndex;
    }

    function hexToRgb(value) {
      const hex = String(value || "#000000").replace("#", "");
      const safe = hex.length === 3
        ? hex.split("").map((char) => char + char).join("")
        : hex.padEnd(6, "0").slice(0, 6);
      return {
        r: parseInt(safe.slice(0, 2), 16),
        g: parseInt(safe.slice(2, 4), 16),
        b: parseInt(safe.slice(4, 6), 16)
      };
    }

    function lzwEncodeLiteral(indices, minCodeSize) {
      const clearCode = 1 << minCodeSize;
      const endCode = clearCode + 1;
      const bytes = [];
      let current = 0;
      let bitCount = 0;
      const codeSize = minCodeSize + 1;
      const clearInterval = 120;

      function writeCode(code) {
        current += code * (1 << bitCount);
        bitCount += codeSize;
        while (bitCount >= 8) {
          bytes.push(current & 0xff);
          current = Math.floor(current / 256);
          bitCount -= 8;
        }
      }

      if (!indices.length) return Uint8Array.from([]);
      writeCode(clearCode);
      for (let i = 0; i < indices.length; i += 1) {
        if (i > 0 && i % clearInterval === 0) {
          writeCode(clearCode);
        }
        writeCode(indices[i]);
      }
      writeCode(endCode);
      if (bitCount > 0) bytes.push(current & 0xff);
      return Uint8Array.from(bytes);
    }

    function gifSubBlocks(data) {
      const parts = [];
      for (let offset = 0; offset < data.length; offset += 255) {
        const chunk = data.subarray(offset, offset + 255);
        parts.push(Uint8Array.from([chunk.length]), chunk);
      }
      parts.push(Uint8Array.from([0]));
      return concatBytes(parts);
    }

    function asciiBytes(value) {
      return Uint8Array.from(String(value).split("").map((char) => char.charCodeAt(0)));
    }

    function asciiFromBytes(bytes) {
      return Array.from(bytes).map((byte) => String.fromCharCode(byte)).join("");
    }

    function u16le(value) {
      return Uint8Array.from([value & 0xff, (value >> 8) & 0xff]);
    }

    function readU32(bytes, offset) {
      return ((bytes[offset] << 24) | (bytes[offset + 1] << 16) | (bytes[offset + 2] << 8) | bytes[offset + 3]) >>> 0;
    }

    function writeU16(bytes, offset, value) {
      bytes[offset] = (value >>> 8) & 0xff;
      bytes[offset + 1] = value & 0xff;
    }

    function writeU32(bytes, offset, value) {
      bytes[offset] = (value >>> 24) & 0xff;
      bytes[offset + 1] = (value >>> 16) & 0xff;
      bytes[offset + 2] = (value >>> 8) & 0xff;
      bytes[offset + 3] = value & 0xff;
    }

    function concatBytes(parts) {
      const length = parts.reduce((total, part) => total + part.length, 0);
      const output = new Uint8Array(length);
      let offset = 0;
      parts.forEach((part) => {
        output.set(part, offset);
        offset += part.length;
      });
      return output;
    }

    let crcTable = null;

    function crc32(bytes) {
      if (!crcTable) {
        crcTable = new Uint32Array(256);
        for (let n = 0; n < 256; n += 1) {
          let c = n;
          for (let k = 0; k < 8; k += 1) {
            c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
          }
          crcTable[n] = c >>> 0;
        }
      }
      let c = 0xffffffff;
      for (const byte of bytes) {
        c = crcTable[(c ^ byte) & 0xff] ^ (c >>> 8);
      }
      return (c ^ 0xffffffff) >>> 0;
    }

    async function ensureOpenType() {
      if (window.opentype) return window.opentype;
      if (!openTypeLoadPromise) {
        openTypeLoadPromise = new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = OPENTYPE_URL;
          script.async = true;
          script.onload = () => window.opentype ? resolve(window.opentype) : reject(new Error("OpenType parser unavailable."));
          script.onerror = () => reject(new Error("Could not load the vector font parser."));
          document.head.appendChild(script);
        });
      }
      return openTypeLoadPromise;
    }

    function dataUrlToArrayBuffer(dataUrl) {
      const parts = String(dataUrl).split(",");
      if (parts.length < 2) throw new Error("Uploaded font data is invalid.");
      const binary = atob(parts[1]);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return bytes.buffer;
    }

    async function getVectorFont() {
      const opentype = await ensureOpenType();
      const choice = getOutlineFontChoice();
      const projectSource = choice && OUTLINE_FONT_FILES[choice.outlineDataKey];
      const embeddedSource = choice && OUTLINE_FONT_DATA[choice.outlineDataKey];
      const source = editorState.uploadedFontName
        ? uploadedFontSource
        : (location.protocol === "file:" ? embeddedSource : projectSource || embeddedSource);
      if (!source) {
        throw new Error("This font cannot be flattened because no outline file is available.");
      }
      const cacheKey = editorState.uploadedFontName ? `uploaded:${editorState.uploadedFontName}:${source.length}` : source;
      if (outlineFontCache.has(cacheKey)) return outlineFontCache.get(cacheKey);

      let buffer;
      if (source.startsWith("data:")) {
        buffer = dataUrlToArrayBuffer(source);
      } else {
        const response = await fetch(source, { cache: "force-cache" });
        if (!response.ok) throw new Error("Could not load the outline font for vector export.");
        buffer = await response.arrayBuffer();
      }

      let font;
      try {
        font = opentype.parse(buffer);
      } catch (error) {
        throw new Error("This font format cannot be flattened. Use a TTF, OTF or WOFF font.");
      }
      outlineFontCache.set(cacheKey, font);
      return font;
    }

    function centeredOpenTypePath(font, text, size) {
      const firstPath = font.getPath(text || "TYPE", 0, 0, size);
      const box = firstPath.getBoundingBox();
      const centerX = Number.isFinite(box.x1) && Number.isFinite(box.x2) ? (box.x1 + box.x2) / 2 : 0;
      const centerY = Number.isFinite(box.y1) && Number.isFinite(box.y2) ? (box.y1 + box.y2) / 2 : 0;
      return font.getPath(text || "TYPE", -centerX, -centerY, size);
    }

    function itemSvgTransform(item, scale = 1) {
      const x = item.x * scale;
      const y = item.y * scale;
      const skew = `skewX(${item.skew.toFixed(2)})`;
      const stretch = `scale(${(item.scaleX * scale).toFixed(3)} ${scale.toFixed(3)})`;
      return `translate(${x.toFixed(2)} ${y.toFixed(2)}) rotate(${item.rotation.toFixed(2)}) ${skew} ${stretch}`;
    }

    async function serializedSvg() {
      const size = getCanvasSize();
      const vectorFont = await getVectorFont();
      const markup = createFlattenedSvgMarkup(size, vectorFont);
      return `<?xml version="1.0" encoding="UTF-8"?>\n${markup}`;
    }

    function createFlattenedSvgMarkup(size, vectorFont) {
      const { items } = buildItems(size);
      const animation = patternAnimationCss(size);
      const background = `<rect width="100%" height="100%" fill="${editorState.bgColor}"></rect>`;
      const pathNodes = items.map((item) => {
        const path = centeredOpenTypePath(vectorFont, item.text, item.size);
        const d = path.toPathData(2);
        return `<path d="${escapeAttribute(d)}" fill="${item.fill}" opacity="${item.opacity.toFixed(3)}" transform="${itemSvgTransform(item)}"></path>`;
      }).join("");
      const styleBlock = `<style>${animation.css}</style>`;
      const motionClass = `motion-layer${animation.className ? ` ${animation.className}` : ""}`;
      const motionStyle = `transform-box:view-box;transform-origin:${(size.width / 2).toFixed(2)}px ${(size.height / 2).toFixed(2)}px;`;
      return `<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Generated typographic asset" viewBox="0 0 ${size.width} ${size.height}" width="${size.width}" height="${size.height}">${styleBlock}${background}<g class="${motionClass}" style="${motionStyle}">${pathNodes}</g></svg>`;
    }

    async function serializedLottie() {
      const settings = animationExportSettings("lottie");
      const sourceSize = settings.sourceSize;
      const exportSize = { width: settings.width, height: settings.height };
      const scale = settings.scale;
      const { items } = buildItems(sourceSize);
      const vectorFont = await getVectorFont();
      const frames = Math.max(2, Math.round(settings.playbackDuration * settings.fps));
      const parentId = 1;
      const motion = lottieMotionKeyframes(exportSize, frames);
      const layers = [
        {
          ddd: 0,
          ind: parentId,
          ty: 3,
          nm: "Pattern Motion",
          sr: 1,
          ks: {
            o: motion.opacity,
            r: motion.rotation,
            p: motion.position,
            a: { a: 0, k: [exportSize.width / 2, exportSize.height / 2, 0] },
            s: motion.scale
          },
          ip: 0,
          op: frames,
          st: 0,
          bm: 0
        },
        ...items.map((item, index) => lottieShapeLayer(item, index + 2, parentId, scale, frames, vectorFont))
      ];
      return JSON.stringify({
        v: "5.9.0",
        fr: settings.fps,
        ip: 0,
        op: frames,
        w: exportSize.width,
        h: exportSize.height,
        nm: "Typo Effects Studio",
        ddd: 0,
        assets: [],
        layers,
        markers: []
      });
    }

    function lottieShapeLayer(item, index, parentId, scale, frames, vectorFont) {
      const path = centeredOpenTypePath(vectorFont, item.text, item.size);
      const rgb = hexToUnitRgb(item.fill);
      const shapes = openTypePathToLottieShapes(path);
      return {
        ddd: 0,
        ind: index,
        ty: 4,
        parent: parentId,
        nm: `Outlined Text ${index - 1}`,
        sr: 1,
        ks: {
          o: { a: 0, k: Math.round(item.opacity * 100) },
          r: { a: 0, k: item.rotation },
          p: { a: 0, k: [item.x * scale, item.y * scale, 0] },
          a: { a: 0, k: [0, 0, 0] },
          s: { a: 0, k: [item.scaleX * 100, 100, 100] }
        },
        shapes: [{
          ty: "gr",
          it: [
            ...shapes,
            { ty: "fl", c: { a: 0, k: [...rgb, 1] }, o: { a: 0, k: 100 }, r: 1, bm: 0 },
            { ty: "tr", p: { a: 0, k: [0, 0] }, a: { a: 0, k: [0, 0] }, s: { a: 0, k: [scale * 100, scale * 100] }, r: { a: 0, k: 0 }, sk: { a: 0, k: item.skew }, sa: { a: 0, k: 0 }, o: { a: 0, k: 100 } }
          ],
          nm: "Outlined glyphs",
          bm: 0
        }],
        ip: 0,
        op: frames,
        st: 0,
        bm: 0
      };
    }

    function openTypePathToLottieShapes(path) {
      const contours = [];
      let current = null;
      let previous = null;

      function startContour(x, y) {
        current = { v: [[x, y]], i: [[0, 0]], o: [[0, 0]], c: false };
        contours.push(current);
        previous = { x, y };
      }

      function lineTo(x, y) {
        if (!current) startContour(x, y);
        current.v.push([x, y]);
        current.i.push([0, 0]);
        current.o.push([0, 0]);
        previous = { x, y };
      }

      function curveTo(x1, y1, x2, y2, x, y) {
        if (!current || !previous) startContour(x, y);
        const prevIndex = current.v.length - 1;
        current.o[prevIndex] = [x1 - previous.x, y1 - previous.y];
        current.v.push([x, y]);
        current.i.push([x2 - x, y2 - y]);
        current.o.push([0, 0]);
        previous = { x, y };
      }

      path.commands.forEach((command) => {
        if (command.type === "M") {
          startContour(command.x, command.y);
        } else if (command.type === "L") {
          lineTo(command.x, command.y);
        } else if (command.type === "C") {
          curveTo(command.x1, command.y1, command.x2, command.y2, command.x, command.y);
        } else if (command.type === "Q" && previous) {
          const c1x = previous.x + (2 / 3) * (command.x1 - previous.x);
          const c1y = previous.y + (2 / 3) * (command.y1 - previous.y);
          const c2x = command.x + (2 / 3) * (command.x1 - command.x);
          const c2y = command.y + (2 / 3) * (command.y1 - command.y);
          curveTo(c1x, c1y, c2x, c2y, command.x, command.y);
        } else if (command.type === "Z" && current) {
          current.c = true;
          current = null;
          previous = null;
        }
      });

      return contours
        .filter((contour) => contour.v.length > 1)
        .map((contour, index) => ({
          ty: "sh",
          ix: index + 1,
          ks: { a: 0, k: roundedLottiePath(contour) },
          nm: `Path ${index + 1}`,
          mn: "ADBE Vector Shape - Group",
          hd: false
        }));
    }

    function roundedLottiePath(path) {
      const round = (value) => Number(value.toFixed(3));
      return {
        i: path.i.map((point) => [round(point[0]), round(point[1])]),
        o: path.o.map((point) => [round(point[0]), round(point[1])]),
        v: path.v.map((point) => [round(point[0]), round(point[1])]),
        c: path.c
      };
    }

    function lottieMotionKeyframes(size, frames) {
      const preset = editorState.animationPreset || "none";
      const amount = clamp(Number(editorState.animationAmount ?? DEFAULT_STATE.animationAmount), 0, 100) / 100;
      const center = [size.width / 2, size.height / 2, 0];
      const staticTransform = {
        position: { a: 0, k: center },
        rotation: { a: 0, k: 0 },
        scale: { a: 0, k: [100, 100, 100] },
        opacity: { a: 0, k: 100 }
      };
      if (preset === "none" || amount <= 0) return staticTransform;

      const ease = { i: { x: [.45], y: [1] }, o: { x: [.45], y: [0] } };
      const holdEase = { i: { x: [1], y: [1] }, o: { x: [0], y: [0] } };
      const keyed = (values) => ({
        a: 1,
        k: values.map((item) => ({
          t: Math.round(item.t * frames),
          s: item.s,
          e: item.e,
          i: item.linear ? holdEase.i : ease.i,
          o: item.linear ? holdEase.o : ease.o
        }))
      });

      if (preset === "drift") {
        return {
          ...staticTransform,
          rotation: keyed([{ t: 0, s: [0], e: [360], linear: true }, { t: 1, s: [360] }])
        };
      }

      if (preset === "orbit") {
        const orbitX = Math.min(size.width, size.height) * (.015 + amount * .045);
        const orbitY = Math.min(size.width, size.height) * (.01 + amount * .035);
        return {
          ...staticTransform,
          position: keyed([
            { t: 0, s: [[center[0] + orbitX, center[1], 0]], e: [[center[0], center[1] + orbitY, 0]], linear: true },
            { t: .25, s: [[center[0], center[1] + orbitY, 0]], e: [[center[0] - orbitX, center[1], 0]], linear: true },
            { t: .5, s: [[center[0] - orbitX, center[1], 0]], e: [[center[0], center[1] - orbitY, 0]], linear: true },
            { t: .75, s: [[center[0], center[1] - orbitY, 0]], e: [[center[0] + orbitX, center[1], 0]], linear: true },
            { t: 1, s: [[center[0] + orbitX, center[1], 0]] }
          ])
        };
      }

      if (preset === "breathe") {
        const high = (1 + amount * .18) * 100;
        const tuck = (1 - amount * .045) * 100;
        return {
          ...staticTransform,
          scale: keyed([
            { t: 0, s: [[100, 100, 100]], e: [[high, high, 100]] },
            { t: .45, s: [[high, high, 100]], e: [[tuck, tuck, 100]] },
            { t: .72, s: [[tuck, tuck, 100]], e: [[100, 100, 100]] },
            { t: 1, s: [[100, 100, 100]] }
          ]),
          opacity: keyed([
            { t: 0, s: [100], e: [(1 - amount * .10) * 100] },
            { t: .45, s: [(1 - amount * .10) * 100], e: [98.5] },
            { t: .72, s: [98.5], e: [100] },
            { t: 1, s: [100] }
          ])
        };
      }

      if (preset === "strobe") {
        const low = Math.max(.42, 1 - amount * .48) * 100;
        const mid = Math.max(.58, 1 - amount * .28) * 100;
        return {
          ...staticTransform,
          opacity: keyed([
            { t: 0, s: [100], e: [mid] },
            { t: .34, s: [mid], e: [low] },
            { t: .62, s: [low], e: [mid] },
            { t: .84, s: [mid], e: [100] },
            { t: 1, s: [100] }
          ])
        };
      }

      if (preset === "wave") {
        const squeeze = (1 - amount * .03) * 100;
        const stretch = (1 + amount * .03) * 100;
        return {
          ...staticTransform,
          scale: keyed([
            { t: 0, s: [[100, 100, 100]], e: [[stretch, 100, 100]] },
            { t: .28, s: [[stretch, 100, 100]], e: [[100, 100, 100]] },
            { t: .52, s: [[100, 100, 100]], e: [[squeeze, 100, 100]] },
            { t: .78, s: [[squeeze, 100, 100]], e: [[100, 100, 100]] },
            { t: 1, s: [[100, 100, 100]] }
          ])
        };
      }

      return staticTransform;
    }

    function hexToUnitRgb(value) {
      const rgb = hexToRgb(value);
      return [rgb.r / 255, rgb.g / 255, rgb.b / 255];
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 300);
    }

    function safeName(extension, suffix = "") {
      const text = (editorState.text || "typo").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "typo";
      return `${text}-${editorState.mode}${suffix ? `-${suffix}` : ""}.${extension}`;
    }

    async function exportSvg() {
      const button = document.getElementById("exportAsset");
      button.disabled = true;
      notice.textContent = "Flattening typography to SVG paths...";
      try {
        const blob = new Blob([await serializedSvg()], { type: "image/svg+xml;charset=utf-8" });
        downloadBlob(blob, safeName("svg"));
        notice.textContent = "SVG exported with outlined typography.";
      } catch (error) {
        notice.textContent = error && error.message ? error.message : "SVG export failed.";
      } finally {
        button.disabled = false;
      }
    }

    async function exportPng() {
      const scale = Number(document.getElementById("exportScale").value) || 2;
      const canvas = document.createElement("canvas");
      try {
        await document.fonts.ready;
      } catch {}
      drawCanvas(canvas, scale);
      const blob = await canvasToBlob(canvas, "image/png");
      downloadBlob(blob, safeName("png"));
      notice.textContent = `PNG exported at ${scale}x.`;
    }

    async function exportJpg() {
      const scale = Number(document.getElementById("exportScale").value) || 2;
      const canvas = document.createElement("canvas");
      try {
        await document.fonts.ready;
      } catch {}
      drawCanvas(canvas, scale);
      const blob = await canvasToBlob(canvas, "image/jpeg", .88);
      downloadBlob(blob, safeName("jpg"));
      notice.textContent = `JPG exported at ${scale}x.`;
    }

    async function exportLottie() {
      const settings = animationExportSettings("lottie");
      const button = document.getElementById("exportAsset");
      button.disabled = true;
      notice.textContent = "Flattening typography to Lottie vector shapes...";
      try {
        const blob = new Blob([await serializedLottie()], { type: "application/json;charset=utf-8" });
        downloadBlob(blob, safeName("json", "lottie"));
        notice.textContent = `Lottie exported with outlined vectors at ${settings.width} × ${settings.height}, ${settings.fps} fps.`;
      } catch (error) {
        notice.textContent = error && error.message ? error.message : "Lottie export failed.";
      } finally {
        button.disabled = false;
      }
    }

    async function copySvg() {
      try {
        notice.textContent = "Flattening SVG paths...";
        await navigator.clipboard.writeText(await serializedSvg());
        notice.textContent = "Outlined SVG copied to clipboard.";
      } catch (error) {
        notice.textContent = error && error.message ? error.message : "Clipboard unavailable; use Export SVG.";
      }
    }

    async function fetchRandomWord() {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 3500);
      let response;
      try {
        response = await fetch(RANDOM_WORD_URL, { signal: controller.signal, cache: "no-store" });
      } finally {
        clearTimeout(timeout);
      }
      if (!response.ok) throw new Error("Random word unavailable.");
      const payload = await response.json();
      const word = Array.isArray(payload) ? payload[0] : payload;
      const text = String(word || "").trim();
      if (!/^[a-z]+$/i.test(text)) throw new Error("Random word unavailable.");
      return text.slice(0, 24);
    }

    async function randomizeWord() {
      const button = document.getElementById("randomWord");
      button.disabled = true;
      button.classList.add("is-loading");
      button.setAttribute("aria-busy", "true");
      notice.textContent = "Fetching random word...";
      try {
        const text = await fetchRandomWord();
        updateState({ text }, "Random word loaded.");
      } catch (error) {
        notice.textContent = "No se pudo cargar la palabra. Inténtalo de nuevo.";
      } finally {
        button.disabled = false;
        button.classList.remove("is-loading");
        button.removeAttribute("aria-busy");
      }
    }

    async function applyInitialRandomWord() {
      if (!shouldLoadRandomWord) return;
      try {
        const text = await fetchRandomWord();
        updateState({ text });
      } catch {}
    }

    async function init() {
      populateControls();
      syncVideoExportSupport();
      bindEvents();
      syncControls();
      renderSvg();
      if (shouldLoadRandomWord) {
        updateState(randomizedStatePatch());
      }
      applyInitialRandomWord();
      try {
        await document.fonts.ready;
      } catch {}
      renderSvg();
    }

    init();
  </script>
</body>
</html>
