<!doctype html>
<!--
  Assumptions:
  - V1 focuses on static typographic pattern assets, not cards, QR, video, or AI generation.
  - The reference style is used as a visual grammar: black field, heavy italic display type, lime/pink/blue accents, spiral/perspective repetition.
  - SVG is the editable/vector export; PNG is drawn from the same computed layout onto canvas so uploaded/browser fonts render more reliably.
  - Curated fonts are served from the project for published builds; uploaded fonts are held in-browser and persisted only for the current session.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Typo Effects Studio</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <style>
    @font-face {
      font-family: "IBM Plex Sans";
      src: url("assets/fonts/IBMPlexSans-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: block;
    }

    @font-face {
      font-family: "IBM Plex Sans";
      src: url("assets/fonts/IBMPlexSans-Medium.ttf") format("truetype");
      font-weight: 500;
      font-style: normal;
      font-display: block;
    }

    @font-face {
      font-family: "IBM Plex Sans";
      src: url("assets/fonts/IBMPlexSans-SemiBold.ttf") format("truetype");
      font-weight: 600;
      font-style: normal;
      font-display: block;
    }

    @font-face {
      font-family: "IBM Plex Sans";
      src: url("assets/fonts/IBMPlexSans-Italic600.ttf") format("truetype");
      font-weight: 600;
      font-style: italic;
      font-display: block;
    }

    @font-face {
      font-family: "Archivo";
      src: url("assets/fonts/Archivo-BlackItalic.ttf") format("truetype");
      font-weight: 900;
      font-style: italic;
      font-display: block;
    }

    @font-face {
      font-family: "Avenir Next Condensed";
      src: url("assets/fonts/Archivo-BlackItalic.ttf") format("truetype");
      font-weight: 900;
      font-style: italic;
      font-display: block;
    }

    :root {
      --bg: #0b0b0c;
      --panel: #111113;
      --panel-2: #19191c;
      --panel-3: #232329;
      --line: #2f2f35;
      --line-soft: #232328;
      --text: #f3f3ef;
      --muted: #a0a0a8;
      --subtle: #686870;
      --lime: #e8ff65;
      --pink: #f246c7;
      --blue: #438ee7;
      --danger: #ff6a6a;
      --radius: 8px;
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "IBM Plex Sans", ui-sans-serif, sans-serif;
      overflow: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
    }

    .app-shell {
      height: 100vh;
      display: grid;
      grid-template-columns: 332px minmax(0, 1fr);
      background: var(--bg);
    }

    .control-panel {
      min-height: 0;
      overflow: auto;
      border-right: 1px solid var(--line-soft);
      background: #090a0b;
      padding: 20px 18px 22px;
    }

    .panel-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand-title {
      margin: 0;
      font-family: "Archivo", "Avenir Next Condensed", sans-serif;
      font-size: 22px;
      line-height: .92;
      letter-spacing: 0;
      font-style: italic;
      font-weight: 900;
    }

    .brand-tag {
      margin-top: 5px;
      color: var(--subtle);
      font-size: 12px;
      line-height: 1.35;
    }

    .status-pill {
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--lime);
      font-size: 11px;
      white-space: nowrap;
      background: #111113;
    }

    .control-section {
      padding: 15px 0;
      border-top: 1px solid var(--line-soft);
    }

    .section-label {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .mode-grid {
      display: grid;
      gap: 8px;
    }

    .mode-button,
    .action-button {
      min-height: 38px;
      border-radius: var(--radius);
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 140ms ease, border-color 140ms ease, color 140ms ease;
    }

    .mode-button:hover,
    .action-button:hover {
      background: var(--panel-3);
      border-color: var(--line);
    }

    .mode-button.active {
      background: var(--lime);
      color: #080808;
      border-color: var(--lime);
      font-weight: 700;
      font-style: italic;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 12px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    label,
    .range-value {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .range-value {
      min-width: 44px;
      text-align: right;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .segment-control {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .segment-button {
      min-height: 30px;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    .segment-button.active {
      background: var(--panel-3);
      color: var(--text);
      font-weight: 600;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      padding: 8px 10px;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      border-color: var(--lime);
    }

    .input-action-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 38px;
      gap: 8px;
      align-items: center;
    }

    .secondary-icon-button {
      width: 38px;
      min-height: 38px;
      display: inline-grid;
      place-items: center;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      transition: background 140ms ease, border-color 140ms ease, color 140ms ease;
    }

    .secondary-icon-button:hover {
      background: var(--panel-2);
      border-color: var(--lime);
      color: var(--lime);
    }

    .secondary-icon-button:disabled {
      opacity: .55;
      cursor: wait;
    }

    .secondary-icon-button svg {
      width: 18px;
      height: 18px;
    }

    .loading-icon {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid color-mix(in srgb, currentColor 24%, transparent);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: icon-spin .7s linear infinite;
    }

    .secondary-icon-button.is-loading .dice-icon {
      display: none;
    }

    .secondary-icon-button.is-loading .loading-icon {
      display: block;
    }

    @keyframes icon-spin {
      to { transform: rotate(360deg); }
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--lime);
    }

    input[type="color"] {
      width: 100%;
      height: 34px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: transparent;
    }

    .inline-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .swatches {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
    }

    .swatch {
      height: 34px;
      border-radius: 7px;
      border: 1px solid var(--line);
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.05);
    }

    .swatch.active {
      outline: 2px solid var(--text);
      outline-offset: 2px;
    }

    .file-input {
      position: relative;
      display: block;
      min-height: 38px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 9px 10px;
      color: var(--muted);
      cursor: pointer;
      overflow: hidden;
      background: rgba(255,255,255,.02);
    }

    .file-input input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .button-grid .wide {
      grid-column: 1 / -1;
    }

    .action-button.primary {
      background: var(--lime);
      color: #080808;
      font-weight: 700;
    }

    .action-button.ghost {
      color: var(--muted);
    }

    .stage-area {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: 54px minmax(0, 1fr);
      background: #0d0e10;
    }

    .stage-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 20px;
      border-bottom: 1px solid var(--line-soft);
      background: #0c0c0e;
    }

    .stage-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .stage-meta strong {
      color: var(--text);
      font-weight: 600;
    }

    .stage-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-button {
      width: 36px;
      height: 36px;
      border-radius: 7px;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid transparent;
      cursor: pointer;
    }

    .icon-button:hover {
      border-color: var(--line);
      background: var(--panel-3);
    }

    .stage-scroll {
      min-height: 0;
      overflow: auto;
      display: grid;
      place-items: center;
      padding: 32px;
      background:
        linear-gradient(#151518 1px, transparent 1px),
        linear-gradient(90deg, #151518 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .stage-scroll.split-scroll {
      place-items: start center;
    }

    .preview-grid {
      width: min(100%, 1240px);
      display: grid;
      gap: 18px;
    }

    .preview-grid.single {
      display: grid;
      place-items: center;
    }

    .preview-grid.split {
      width: min(100%, 1380px);
      grid-template-columns: repeat(2, minmax(260px, 1fr));
      align-items: start;
    }

    .artboard-card {
      min-width: 0;
      display: grid;
      gap: 8px;
      cursor: pointer;
    }

    .preview-grid.single .artboard-card {
      width: 100%;
      cursor: default;
    }

    .artboard-label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .artboard-label strong {
      color: var(--text);
      font-weight: 600;
    }

    .artboard-wrap {
      width: 100%;
      background: #020202;
      border: 1px solid #1f2025;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,.28);
    }

    .artboard-card.active .artboard-wrap {
      border-color: color-mix(in srgb, var(--lime) 78%, #1f2025);
    }

    .preview-grid.split .artboard-card[data-preview-preset="portrait"],
    .preview-grid.split .artboard-card[data-preview-preset="story"] {
      width: min(100%, 360px);
      justify-self: center;
    }

    .preview-svg,
    .preview-canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: var(--aspect, 16 / 9);
      background: #020202;
    }

    .notice {
      min-height: 18px;
      margin-top: 10px;
      color: var(--subtle);
      font-size: 12px;
      line-height: 1.4;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 880px) {
      body {
        overflow: auto;
      }

      .app-shell {
        height: auto;
        min-height: 100vh;
        grid-template-columns: 1fr;
      }

      .control-panel {
        max-height: none;
        border-right: 0;
        border-bottom: 1px solid var(--line-soft);
      }

      .stage-area {
        min-height: 70vh;
      }

      .stage-bar {
        align-items: flex-start;
        height: auto;
        padding: 14px 16px;
        flex-direction: column;
      }

      .stage-scroll {
        padding: 16px;
      }

      .preview-grid.split {
        grid-template-columns: 1fr;
      }

      .preview-grid.split .artboard-card[data-preview-preset="portrait"],
      .preview-grid.split .artboard-card[data-preview-preset="story"] {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <aside class="control-panel" aria-label="Typographic controls">
      <div class="panel-top">
        <div>
          <h1 class="brand-title">Typo Effects<br>Studio</h1>
          <div class="brand-tag">Procedural SVG assets</div>
        </div>
        <div class="status-pill">V1</div>
      </div>

      <section class="control-section">
        <p class="section-label">Mode</p>
        <div class="mode-grid" role="group" aria-label="Pattern mode">
          <button class="mode-button" data-mode="field" type="button">Text Field</button>
          <button class="mode-button" data-mode="spiral" type="button">Spiral</button>
          <button class="mode-button" data-mode="tunnel" type="button">Perspective Tunnel</button>
        </div>
      </section>

      <section class="control-section">
        <p class="section-label">Source</p>
        <div class="field">
          <label for="textInput">Text input</label>
          <div class="input-action-row">
            <input id="textInput" type="text" spellcheck="false" autocomplete="off">
            <button id="randomWord" class="secondary-icon-button" type="button" title="Random word" aria-label="Random word">
              <svg class="dice-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="3"></rect>
                <circle cx="8" cy="8" r=".9" fill="currentColor" stroke="none"></circle>
                <circle cx="16" cy="8" r=".9" fill="currentColor" stroke="none"></circle>
                <circle cx="12" cy="12" r=".9" fill="currentColor" stroke="none"></circle>
                <circle cx="8" cy="16" r=".9" fill="currentColor" stroke="none"></circle>
                <circle cx="16" cy="16" r=".9" fill="currentColor" stroke="none"></circle>
              </svg>
              <span class="loading-icon" aria-hidden="true"></span>
            </button>
          </div>
        </div>
        <div class="field">
          <label for="fontSelect">Display font</label>
          <select id="fontSelect"></select>
        </div>
        <label class="file-input">
          <span id="fontUploadLabel">Load local font</span>
          <input id="fontUpload" type="file" accept=".ttf,.otf,.woff,.woff2,font/ttf,font/otf,font/woff,font/woff2">
        </label>
      </section>

      <section class="control-section">
        <p class="section-label">Canvas</p>
        <div class="field">
          <label>Preview</label>
          <div class="segment-control" role="group" aria-label="Preview layout">
            <button class="segment-button" data-preview-mode="single" type="button">Single</button>
            <button class="segment-button" data-preview-mode="split" type="button">Split</button>
          </div>
        </div>
        <div class="field">
          <label for="presetSelect">Preset</label>
          <select id="presetSelect"></select>
        </div>
        <div id="customSizeFields" class="inline-fields hidden">
          <div class="field">
            <label for="customWidth">Width</label>
            <input id="customWidth" type="number" min="256" max="6000" step="1">
          </div>
          <div class="field">
            <label for="customHeight">Height</label>
            <input id="customHeight" type="number" min="256" max="6000" step="1">
          </div>
        </div>
      </section>

      <section class="control-section">
        <p class="section-label">Color</p>
        <div id="swatches" class="swatches" aria-label="Color swatches"></div>
        <div class="inline-fields" style="margin-top: 12px;">
          <div class="field">
            <label for="fillColor">Type</label>
            <input id="fillColor" type="color">
          </div>
          <div class="field">
            <label for="bgColor">Background</label>
            <input id="bgColor" type="color">
          </div>
        </div>
      </section>

      <section class="control-section">
        <p class="section-label">Pattern</p>
        <div id="rangeControls"></div>
      </section>

      <section class="control-section">
        <p class="section-label">Animation</p>
        <div class="field">
          <label for="animationSelect">Loop preset</label>
          <select id="animationSelect"></select>
        </div>
        <div id="animationRangeControls"></div>
      </section>

      <section class="control-section">
        <p class="section-label">Export</p>
        <div class="field">
          <label for="exportFormat">Format</label>
          <select id="exportFormat">
            <option value="svg">SVG</option>
            <option value="png">PNG</option>
            <option value="jpg">JPG</option>
            <option value="apng">APNG</option>
            <option value="gif">GIF</option>
            <option value="lottie">Lottie</option>
            <option value="mp4" selected>MP4</option>
          </select>
        </div>
        <div class="field" data-export-control="scale">
          <label for="exportScale">Scale</label>
          <select id="exportScale">
            <option value="1">1x</option>
            <option value="2" selected>2x</option>
            <option value="4">4x</option>
          </select>
        </div>
        <div class="field" data-export-control="width">
          <label for="exportLoopWidth">Width</label>
          <select id="exportLoopWidth">
            <option value="360">360 px</option>
            <option value="540">540 px</option>
            <option value="720">720 px</option>
            <option value="1080">1080 px</option>
            <option value="source" selected>Source</option>
          </select>
        </div>
        <div class="field" data-export-control="fps">
          <label for="exportLoopFps">FPS</label>
          <select id="exportLoopFps">
            <option value="12">12 fps</option>
            <option value="24">24 fps</option>
            <option value="30">30 fps</option>
            <option value="48">48 fps</option>
            <option value="60" selected>60 fps</option>
          </select>
        </div>
        <div class="button-grid">
          <button id="exportAsset" class="action-button primary wide" type="button">Export</button>
          <button id="randomize" class="action-button" type="button">Randomize</button>
          <button id="reset" class="action-button ghost" type="button">Reset</button>
        </div>
        <div id="notice" class="notice" aria-live="polite"></div>
      </section>
    </aside>

    <section class="stage-area" aria-label="Preview">
      <div class="stage-bar">
        <div class="stage-meta">
          <strong id="stageName">Spiral</strong>
          <span id="stageSize">1920 × 1080</span>
          <span id="stageCount">0 clones</span>
        </div>
        <div class="stage-actions">
          <button class="icon-button" id="fitView" type="button" title="Fit preview">Fit</button>
          <button class="icon-button" id="copySvg" type="button" title="Copy SVG">SVG</button>
        </div>
      </div>
      <div class="stage-scroll" id="stageScroll">
        <div class="preview-grid single" id="previewGrid"></div>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "typography-effects-studio-v1";
    const RANDOM_WORD_URL = "https://random-word-api.herokuapp.com/word?length=5&diff=1";
    const OPENTYPE_URL = "https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js";

    const OUTLINE_FONT_FILES = {
      archivoBlackItalic: "assets/fonts/Archivo-BlackItalic.ttf",
      chivoBlackItalic: "assets/fonts/Chivo-BlackItalic.ttf",
      bricolageExtraBold: "assets/fonts/Bricolage-ExtraBold.ttf",
      rubikMonoOne: "assets/fonts/RubikMonoOne-Regular.ttf"
    };

    // Direct file:// sessions cannot fetch sibling font binaries, so exports keep an embedded fallback.

    function getRadiusBounds() {
      const inner = clamp(Number(editorState.innerRadius ?? DEFAULT_STATE.innerRadius), 0, 800);
      const requestedOuter = clamp(Number(editorState.outerRadius ?? DEFAULT_STATE.outerRadius), 80, 1400);
      return {
        innerRadius: inner,
        outerRadius: Math.max(inner + 1, requestedOuter)
      };
    }

    function seeded(seed) {
      let value = seed % 2147483647;
      if (value <= 0) value += 2147483646;
      return function random() {
        value = value * 16807 % 2147483647;
        return (value - 1) / 2147483646;
      };
    }

    function escapeText(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function escapeAttribute(value) {
      return escapeText(value).replace(/"/g, "&quot;");
    }

    function buildItems(size = getCanvasSize()) {
      const random = seeded(editorState.seed);
      const text = editorState.text.trim() || "TYPE";
      const items = [];
      const width = size.width;
      const height = size.height;
      const cx = width / 2;
      const cy = height / 2 + editorState.spiralPosition * (height / 900);
      const fontSize = Number(editorState.fontSize);
      const count = Number(editorState.cloneCount);
      const jitter = Number(editorState.jitter);
      const widthScale = Number(editorState.widthScale) / 100;
      const bend = Number(editorState.characterBend);
      const { innerRadius, outerRadius } = getRadiusBounds();

      if (editorState.mode === "field") {
        const cols = Math.max(4, Math.round(Math.sqrt(count * width / height)));
        const rows = Math.max(3, Math.ceil(count / cols));
        const cellW = width / cols;
        const cellH = height / rows;
        for (let i = 0; i < count; i += 1) {
          const col = i % cols;
          const row = Math.floor(i / cols);
          const x = col * cellW + cellW * (.25 + random() * .7);
          const y = row * cellH + cellH * (.25 + random() * .65);
          const r = editorState.rotation + editorState.angle + (random() - .5) * 74;
          const s = .62 + random() * .62;
          items.push({
            text,
            x,
            y,
            rotation: r,
            size: fontSize * s,
            scaleX: widthScale * (1 + (random() - .5) * .18),
            skew: bend + (random() - .5) * 10,
            opacity: applyOpacity(.28 + random() * .72),
            fill: editorState.fillColor
          });
        }
      }

      if (editorState.mode === "spiral") {
        const arms = Math.max(1, Number(editorState.spiralCount));
        const perArm = Math.ceil(count / arms);
        for (let arm = 0; arm < arms; arm += 1) {
          const armOffset = arm * (360 / arms);
          for (let i = 0; i < perArm; i += 1) {
            const index = arm * perArm + i;
            if (index >= count) break;
            const t = perArm <= 1 ? 0 : i / (perArm - 1);
            const radius = innerRadius + Math.pow(t, .92) * (outerRadius - innerRadius);
            const theta = degToRad(armOffset + editorState.rotation + t * 430 + editorState.angle * 2);
            const drift = (random() - .5) * jitter;
            const x = cx + Math.cos(theta) * (radius + drift);
            const y = cy + Math.sin(theta) * (radius + drift);
            const edgeBoost = .42 + t * .50;
            items.push({
              text,
              x,
              y,
              rotation: armOffset + editorState.rotation + t * 430 + 88 + editorState.angle,
              size: fontSize * edgeBoost,
              scaleX: widthScale * (1 + t * .22),
              skew: bend * (1 - t * .3),
              opacity: applyOpacity(.30 + t * .55),
              fill: editorState.fillColor
            });
          }
        }
      }

      if (editorState.mode === "tunnel") {
        const arms = Math.max(2, Number(editorState.spiralCount) + 3);
        const rings = Math.ceil(count / arms);
        const minRadius = innerRadius;
        const maxRadius = Math.max(innerRadius + 1, outerRadius);
        for (let ring = 0; ring < rings; ring += 1) {
          const t = rings <= 1 ? 1 : ring / (rings - 1);
          const radius = maxRadius - Math.pow(t, 1.55) * (maxRadius - minRadius);
          for (let arm = 0; arm < arms; arm += 1) {
            const index = ring * arms + arm;
            if (index >= count) break;
            const base = arm * (360 / arms) + editorState.rotation;
            const wave = Math.sin((ring * .72) + arm) * editorState.angle;
            const theta = degToRad(base + wave);
            const x = cx + Math.cos(theta) * radius + (random() - .5) * jitter;
            const y = cy + Math.sin(theta) * radius + (random() - .5) * jitter;
            const perspective = .42 + (1 - t) * 1.35;
            items.push({
              text,
              x,
              y,
              rotation: base + wave + 90,
              size: fontSize * perspective,
              scaleX: widthScale * (1.1 + (1 - t) * .42),
              skew: bend + (1 - t) * editorState.angle * .15,
              opacity: applyOpacity(.28 + (1 - t) * .7),
              fill: editorState.fillColor
            });
          }
        }
      }

      return { size, text, items };
    }

    function getPreviewPresets() {
      if (editorState.previewMode !== "split") {
        return [getPreset()];
      }

      const splitKeys = ["square", "portrait", "story", "wide"];
      const activePreset = getPreset();
      const presets = CANVAS_PRESETS.filter((preset) => splitKeys.includes(preset.key));
      return [activePreset, ...presets.filter((preset) => preset.key !== activePreset.key)];
    }

    function createSvgMarkup(size, options = {}) {
      const { items } = buildItems(size);
      const font = getFont();
      const fontStyle = font.italic ? "italic" : "normal";
      const importCss = `
        @font-face{font-family:"Archivo";src:url("${OUTLINE_FONT_FILES.archivoBlackItalic}") format("truetype");font-weight:900;font-style:italic;font-display:block;}
        @font-face{font-family:"Chivo";src:url("${OUTLINE_FONT_FILES.chivoBlackItalic}") format("truetype");font-weight:900;font-style:italic;font-display:block;}
        @font-face{font-family:"Bricolage Grotesque";src:url("${OUTLINE_FONT_FILES.bricolageExtraBold}") format("truetype");font-weight:800 900;font-style:normal;font-display:block;}
        @font-face{font-family:"Rubik Mono One";src:url("${OUTLINE_FONT_FILES.rubikMonoOne}") format("truetype");font-weight:900;font-style:normal;font-display:block;}
        @font-face{font-family:"Avenir Next Condensed";src:url("${OUTLINE_FONT_FILES.archivoBlackItalic}") format("truetype");font-weight:900;font-style:italic;font-display:block;}
      `;
      const uploadCss = uploadedFontSource && editorState.uploadedFontName
        ? `@font-face{font-family:"${editorState.uploadedFontName}";src:url("${uploadedFontSource}") format("truetype");font-weight:900;font-style:italic;}`
        : "";
      const animation = patternAnimationCss(size);
      const styleBlock = `<style>${importCss}${uploadCss}${animation.css}.asset-text{font-family:"${font.family}",sans-serif;font-weight:900;font-style:${fontStyle};dominant-baseline:middle;text-anchor:middle;letter-spacing:0;}</style>`;
      const background = `<rect width="100%" height="100%" fill="${editorState.bgColor}"></rect>`;
      const textNodes = items.map((item) => {
        const skew = `skewX(${item.skew.toFixed(2)})`;
        const scale = `scale(${item.scaleX.toFixed(3)} 1)`;
        const transform = `translate(${item.x.toFixed(2)} ${item.y.toFixed(2)}) rotate(${item.rotation.toFixed(2)}) ${skew} ${scale}`;
        return `<g transform="${transform}"><text class="asset-text" x="0" y="0" font-size="${item.size.toFixed(2)}" opacity="${item.opacity.toFixed(3)}" fill="${item.fill}">${escapeText(item.text)}</text></g>`;
      }).join("");

      const id = options.active ? ' id="artboard"' : "";
      const motionClass = `motion-layer${animation.className ? ` ${animation.className}` : ""}`;
      const motionStyle = `transform-box:view-box;transform-origin:${(size.width / 2).toFixed(2)}px ${(size.height / 2).toFixed(2)}px;will-change:transform,opacity;animation-delay:${liveAnimationDelaySeconds().toFixed(3)}s;animation-fill-mode:both;`;
      return `<svg${id} class="preview-svg" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Generated typographic asset" viewBox="0 0 ${size.width} ${size.height}" width="${size.width}" height="${size.height}" style="--aspect: ${size.width} / ${size.height};">${styleBlock}${background}<g class="${motionClass}" style="${motionStyle}">${textNodes}</g></svg>`;
    }

    function scheduleRenderSvg() {
      if (previewRenderFrame) return;
      previewRenderFrame = requestAnimationFrame(() => {
        previewRenderFrame = 0;
        renderSvg();
      });
    }

    function renderSvg() {
      const activeSize = getCanvasSize();
      const activeItems = buildItems(activeSize).items;
      const presets = getPreviewPresets();
      document.getElementById("stageScroll").classList.toggle("split-scroll", editorState.previewMode === "split");
      previewGrid.className = `preview-grid ${editorState.previewMode}`;
      const layoutKey = previewLayoutSignature(presets);
      if (layoutKey !== previewLayoutKey) {
        previewLayoutKey = layoutKey;
        previewGrid.innerHTML = presets.map((preset) => {
          const size = getCanvasSize(preset.key);
          const isActive = preset.key === editorState.preset;
          return `<article class="artboard-card ${isActive ? "active" : ""}" data-preview-preset="${preset.key}" aria-label="${preset.label} preview">
            <div class="artboard-label">
              <strong>${preset.label}</strong>
              <span>${size.width} × ${size.height}</span>
            </div>
            <div class="artboard-wrap">
              <canvas class="preview-canvas" data-preview-canvas="${preset.key}" style="--aspect: ${size.width} / ${size.height};"></canvas>
            </div>
          </article>`;
        }).join("");
      } else {
        previewGrid.querySelectorAll("[data-preview-preset]").forEach((card) => {
          const preset = CANVAS_PRESETS.find((item) => item.key === card.dataset.previewPreset);
          if (!preset) return;
          const size = getCanvasSize(preset.key);
          card.classList.toggle("active", preset.key === editorState.preset);
          const label = card.querySelector(".artboard-label span");
          if (label) label.textContent = `${size.width} × ${size.height}`;
          const canvas = card.querySelector(".preview-canvas");
          if (canvas) canvas.style.setProperty("--aspect", `${size.width} / ${size.height}`);
        });
      }

      document.getElementById("stageSize").textContent = editorState.previewMode === "split"
        ? `${presets.length} canvases`
        : `${activeSize.width} × ${activeSize.height}`;
      document.getElementById("stageCount").textContent = `${activeItems.length} clones · ${animationLabel()} · export ${activeSize.width} × ${activeSize.height}`;
      document.getElementById("stageName").textContent = modeLabel(editorState.mode);
      drawPreviewCanvases();
      ensurePreviewAnimationLoop();
    }

    function previewLayoutSignature(presets) {
      return presets.map((preset) => {
        const size = getCanvasSize(preset.key);
        return `${preset.key}:${size.width}x${size.height}:${preset.key === editorState.preset ? "active" : ""}`;
      }).join("|");
    }

    function previewScaleForSize(size) {
      const maxPreviewPixels = 1600;
      return Math.min(1, maxPreviewPixels / Math.max(size.width, size.height));
    }

    function previewShouldAnimate() {
      const amount = clamp(Number(editorState.animationAmount ?? DEFAULT_STATE.animationAmount), 0, 100);
      return editorState.animationPreset !== "none" && amount > 0;
    }

    function currentPreviewProgress() {
      if (!previewShouldAnimate()) return 0;
      const duration = animationDurationSeconds();
      const elapsed = (performance.now() - animationClockStartedAt) / 1000;
      return (elapsed % duration) / duration;
    }

    function drawPreviewCanvases() {
      const progress = currentPreviewProgress();
      previewGrid.querySelectorAll(".preview-canvas").forEach((canvas) => {
        const size = getCanvasSize(canvas.dataset.previewCanvas);
        drawCanvasFrame(canvas, previewScaleForSize(size), size, progress);
      });
    }

    function ensurePreviewAnimationLoop() {
      if (!previewShouldAnimate() || previewAnimationFrame) return;
      previewAnimationFrame = requestAnimationFrame(previewAnimationTick);
    }

    function previewAnimationTick() {
      previewAnimationFrame = 0;
      drawPreviewCanvases();
      ensurePreviewAnimationLoop();
    }

    function drawCanvas(canvas, scale = 1, size = getCanvasSize()) {
      drawCanvasFrame(canvas, scale, size, 0);
    }

    function drawCanvasFrame(canvas, scale = 1, size = getCanvasSize(), progress = 0) {
      const { items } = buildItems(size);
      const font = getFont();
      const ctx = canvas.getContext("2d");
      const motion = animationFrameState(progress, size);
      const targetWidth = Math.max(1, Math.round(size.width * scale));
      const targetHeight = Math.max(1, Math.round(size.height * scale));
      if (canvas.width !== targetWidth) canvas.width = targetWidth;
      if (canvas.height !== targetHeight) canvas.height = targetHeight;
      ctx.setTransform(canvas.width / size.width, 0, 0, canvas.height / size.height, 0, 0);
      ctx.fillStyle = editorState.bgColor;
      ctx.fillRect(0, 0, size.width, size.height);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.save();
      applyMotionToContext(ctx, motion, size);
      for (const item of items) {
        ctx.save();
        ctx.globalAlpha = motion.opacity * item.opacity;
        ctx.translate(item.x, item.y);
        ctx.rotate(degToRad(item.rotation));
        ctx.transform(1, 0, Math.tan(degToRad(item.skew)), 1, 0, 0);
        ctx.scale(item.scaleX, 1);
        ctx.fillStyle = item.fill;
        ctx.font = `${font.italic ? "italic " : ""}900 ${item.size}px "${font.family}", sans-serif`;
        ctx.fillText(item.text, 0, 0);
        ctx.restore();
      }
      ctx.restore();
    }

    function applyMotionToContext(ctx, motion, size) {
      ctx.translate(size.width / 2, size.height / 2);
      ctx.translate(motion.x, motion.y);
      ctx.rotate(degToRad(motion.rotation));
      ctx.transform(1, 0, Math.tan(degToRad(motion.skewX)), 1, 0, 0);
      ctx.scale(motion.scale * motion.scaleX, motion.scale);
      ctx.translate(-size.width / 2, -size.height / 2);
    }

    function animationDurationSeconds() {
      const speed = clamp(Number(editorState.animationSpeed ?? DEFAULT_STATE.animationSpeed), 25, 240) / 100;
      if (editorState.animationPreset === "none") return 2;
      if (editorState.animationPreset === "drift") return 12 / speed;
      if (editorState.animationPreset === "strobe") return 6.5 / speed;
      return 8.5 / speed;
    }

    function liveAnimationDelaySeconds() {
      const preset = editorState.animationPreset || "none";
      const amount = clamp(Number(editorState.animationAmount ?? DEFAULT_STATE.animationAmount), 0, 100);
      if (preset === "none" || amount <= 0) return 0;
      const duration = animationDurationSeconds();
      const elapsed = (performance.now() - animationClockStartedAt) / 1000;
      return -(elapsed % duration);
    }

    function animationFrameState(progress, size = getCanvasSize()) {
      const preset = editorState.animationPreset || "none";
      const amount = clamp(Number(editorState.animationAmount ?? DEFAULT_STATE.animationAmount), 0, 100) / 100;
      const p = ((progress % 1) + 1) % 1;
      const motion = { x: 0, y: 0, rotation: 0, scale: 1, scaleX: 1, skewX: 0, opacity: 1 };
      if (preset === "none" || amount <= 0) return motion;

      if (preset === "drift") {
        motion.rotation = p * 360;
        return motion;
      }

      if (preset === "orbit") {
        const orbitX = Math.min(size.width, size.height) * (.015 + amount * .045);
        const orbitY = Math.min(size.width, size.height) * (.01 + amount * .035);
        const turn = p * Math.PI * 2;
        motion.x = Math.cos(turn) * orbitX;
        motion.y = Math.sin(turn) * orbitY;
        motion.rotation = Math.sin(turn * 2) * amount * 2.2;
        return motion;
      }

      if (preset === "breathe") {
        const frame = interpolateFrames(p, [
          { t: 0, scale: 1, opacity: 1 },
          { t: .45, scale: 1 + amount * .18, opacity: 1 - amount * .10 },
          { t: .72, scale: 1 - amount * .045, opacity: .985 },
          { t: 1, scale: 1, opacity: 1 }
        ], easeInOutSine);
        motion.scale = frame.scale;
        motion.opacity = frame.opacity;
        return motion;
      }

      if (preset === "wave") {
        const turn = Math.sin(p * Math.PI * 2);
        motion.skewX = turn * (1.5 + amount * 12);
        motion.scaleX = 1 + turn * amount * .03;
        return motion;
      }

      if (preset === "strobe") {
        const low = Math.max(.42, 1 - amount * .48);
        const mid = Math.max(.58, 1 - amount * .28);
        const frame = interpolateFrames(p, [
          { t: 0, opacity: 1 },
          { t: .34, opacity: mid },
          { t: .62, opacity: low },
          { t: .84, opacity: mid },
          { t: 1, opacity: 1 }
        ], easeInOutSine);
        motion.opacity = frame.opacity;
      }
      return motion;
    }

    function interpolateFrames(progress, frames, easing = (value) => value) {
      const first = frames[0];
      for (let i = 0; i < frames.length - 1; i += 1) {
        const current = frames[i];
        const next = frames[i + 1];
        if (progress < current.t || progress > next.t) continue;
        const span = next.t - current.t || 1;
        const local = easing((progress - current.t) / span);
        const result = {};
        Object.keys(next).forEach((key) => {
          if (key === "t") return;
          const start = current[key] ?? next[key];
          const end = next[key];
          result[key] = start + (end - start) * local;
        });
        return result;
      }
      return { ...first };
    }

    function easeInOutSine(value) {
      return -(Math.cos(Math.PI * clamp(value, 0, 1)) - 1) / 2;
    }

    function modeLabel(mode) {
      if (mode === "field") return "Text Field";
      if (mode === "tunnel") return "Perspective Tunnel";
      return "Spiral";
    }

    function animationLabel() {
      const preset = ANIMATION_PRESETS.find((item) => item.key === editorState.animationPreset);
      return preset ? preset.label : "Static";
    }

    function patternAnimationCss(size) {
      const preset = editorState.animationPreset || "none";
      if (preset === "none") return { className: "", css: "" };

      const amount = clamp(Number(editorState.animationAmount ?? DEFAULT_STATE.animationAmount), 0, 100) / 100;
      if (amount <= 0) return { className: "", css: "" };

      const speed = clamp(Number(editorState.animationSpeed ?? DEFAULT_STATE.animationSpeed), 25, 240) / 100;
      const dur = (8.5 / speed).toFixed(3);
      const slowDur = (12 / speed).toFixed(3);
      const pulseDur = (6.5 / speed).toFixed(3);
      const orbitX = Number((Math.min(size.width, size.height) * (.015 + amount * .045)).toFixed(2));
      const orbitY = Number((Math.min(size.width, size.height) * (.01 + amount * .035)).toFixed(2));
      const suffix = `${preset}-${Math.round(size.width)}x${Math.round(size.height)}-${Math.round(amount * 100)}-${Math.round(speed * 100)}`;
      const className = `loop-${suffix}`;
      const keyframeName = `loop_${suffix.replace(/[^a-z0-9_-]/gi, "_")}`;
      const smoothEase = "cubic-bezier(.45,0,.2,1)";
      const silkEase = "cubic-bezier(.37,0,.25,1)";

      if (preset === "orbit") {
        const roll = (amount * 2.2).toFixed(2);
        return {
          className,
          css: `.${className}{animation:${keyframeName} ${dur}s linear infinite;}@keyframes ${keyframeName}{0%,100%{transform:translate(${orbitX}px,0) rotate(0deg);}12.5%{transform:translate(${(orbitX * .7).toFixed(2)}px,${(orbitY * .7).toFixed(2)}px) rotate(${roll}deg);}25%{transform:translate(0,${orbitY}px) rotate(0deg);}37.5%{transform:translate(${(-orbitX * .7).toFixed(2)}px,${(orbitY * .7).toFixed(2)}px) rotate(${-roll}deg);}50%{transform:translate(${-orbitX}px,0) rotate(0deg);}62.5%{transform:translate(${(-orbitX * .7).toFixed(2)}px,${(-orbitY * .7).toFixed(2)}px) rotate(${roll}deg);}75%{transform:translate(0,${-orbitY}px) rotate(0deg);}87.5%{transform:translate(${(orbitX * .7).toFixed(2)}px,${(-orbitY * .7).toFixed(2)}px) rotate(${-roll}deg);}}`
        };
      }

      if (preset === "breathe") {
        const scale = (1 + amount * .18).toFixed(3);
        const tuck = (1 - amount * .045).toFixed(3);
        const opacity = (1 - amount * .10).toFixed(3);
        return {
          className,
          css: `.${className}{animation:${keyframeName} ${dur}s ${silkEase} infinite;}@keyframes ${keyframeName}{0%,100%{transform:scale(1);opacity:1;}45%{transform:scale(${scale});opacity:${opacity};}72%{transform:scale(${tuck});opacity:.985;}}`
        };
      }

      if (preset === "drift") {
        return {
          className,
          css: `.${className}{animation:${keyframeName} ${slowDur}s linear infinite;}@keyframes ${keyframeName}{to{transform:rotate(360deg);}}`
        };
      }

      if (preset === "wave") {
        const bend = (1.5 + amount * 12).toFixed(2);
        const squeeze = (1 - amount * .035).toFixed(3);
        const stretch = (1 + amount * .025).toFixed(3);
        return {
          className,
          css: `.${className}{animation:${keyframeName} ${dur}s ${silkEase} infinite;}@keyframes ${keyframeName}{0%,100%{transform:skewX(0deg) scaleX(1);}28%{transform:skewX(${bend}deg) scaleX(${stretch});}52%{transform:skewX(0deg) scaleX(1);}78%{transform:skewX(${-bend}deg) scaleX(${squeeze});}}`
        };
      }

      if (preset === "strobe") {
        const low = Math.max(.42, 1 - amount * .48).toFixed(3);
        const mid = Math.max(.58, 1 - amount * .28).toFixed(3);
        return {
          className,
          css: `.${className}{animation:${keyframeName} ${pulseDur}s ${smoothEase} infinite;}@keyframes ${keyframeName}{0%,100%{opacity:1;}34%{opacity:${mid};}62%{opacity:${low};}84%{opacity:${mid};}}`
        };
      }

      return { className: "", css: "" };
    }

    function syncControls() {
      document.querySelectorAll(".mode-button").forEach((button) => {
        button.classList.toggle("active", button.dataset.mode === editorState.mode);
      });
      document.querySelectorAll(".segment-button").forEach((button) => {
        button.classList.toggle("active", button.dataset.previewMode === editorState.previewMode);
      });
      document.getElementById("textInput").value = editorState.text;
      document.getElementById("fontSelect").value = editorState.uploadedFontName ? "uploaded" : String(editorState.fontIndex);
      document.getElementById("animationSelect").value = editorState.animationPreset;
      document.getElementById("presetSelect").value = editorState.preset;
      document.getElementById("customWidth").value = editorState.customWidth;
      document.getElementById("customHeight").value = editorState.customHeight;
      document.getElementById("fillColor").value = editorState.fillColor;
      document.getElementById("bgColor").value = editorState.bgColor;
      document.getElementById("customSizeFields").classList.toggle("hidden", editorState.preset !== "custom");
      syncExportControls();
      document.querySelectorAll("[data-range-key]").forEach((input) => {
        input.value = editorState[input.dataset.rangeKey];
        const valueEl = document.querySelector(`[data-range-value="${input.dataset.rangeKey}"]`);
        if (valueEl) valueEl.textContent = editorState[input.dataset.rangeKey];
      });
      const visiblePatternKeys = MODE_RANGE_KEYS[editorState.mode] || MODE_RANGE_KEYS.spiral;
      document.querySelectorAll("#rangeControls [data-range-field]").forEach((field) => {
        const isVisible = visiblePatternKeys.has(field.dataset.rangeField);
        field.classList.toggle("hidden", !isVisible);
        field.setAttribute("aria-hidden", String(!isVisible));
      });
      document.querySelectorAll(".swatch").forEach((button) => {
        button.classList.toggle("active", button.dataset.fill === editorState.fillColor && button.dataset.bg === editorState.bgColor);
      });
    }

    function updateState(patch, message = "") {
      editorState = { ...editorState, ...patch };
      saveState();
      syncControls();
      scheduleRenderSvg();
      notice.textContent = message;
    }

    function populateControls() {
      const fontSelect = document.getElementById("fontSelect");
      fontSelect.innerHTML = FONT_CHOICES.map((font, index) => `<option value="${index}">${font.label}</option>`).join("") +
        (editorState.uploadedFontName ? `<option value="uploaded">${editorState.uploadedFontName}</option>` : "");

    function bindEvents() {
      document.querySelectorAll(".mode-button").forEach((button) => {
        button.addEventListener("click", () => updateState({ mode: button.dataset.mode }));
      });

      document.querySelectorAll(".segment-button").forEach((button) => {
        button.addEventListener("click", () => updateState({ previewMode: button.dataset.previewMode }));
      });

      previewGrid.addEventListener("click", (event) => {
        const card = event.target.closest("[data-preview-preset]");
        if (!card || editorState.previewMode !== "split") return;
        const preset = CANVAS_PRESETS.find((item) => item.key === card.dataset.previewPreset);
        if (!preset || preset.key === editorState.preset) return;
        const patch = { preset: preset.key };
        if (preset.key !== "custom") {
          patch.customWidth = preset.width;
          patch.customHeight = preset.height;
        }
        updateState(patch, `${preset.label} selected for export.`);

      });

      document.getElementById("randomWord").addEventListener("click", randomizeWord);

      document.getElementById("fontSelect").addEventListener("change", (event) => {
        if (event.target.value === "uploaded") {
          updateState({ uploadedFontName: editorState.uploadedFontName });
          return;
        }
        updateState({ fontIndex: Number(event.target.value), uploadedFontName: "" });
      });

      document.getElementById("animationSelect").addEventListener("change", (event) => {
        updateState({ animationPreset: event.target.value });
      });

      document.getElementById("fontUpload").addEventListener("change", async (event) => {

        const reader = new FileReader();
        reader.onload = async () => {
          uploadedFontSource = String(reader.result);
          outlineFontCache.clear();
          try {
            const face = new FontFace(name, `url(${uploadedFontSource})`);
            await face.load();
            document.fonts.add(face);
            editorState.uploadedFontName = name;
            const fontSelect = document.getElementById("fontSelect");
            fontSelect.innerHTML = FONT_CHOICES.map((font, index) => `<option value="${index}">${font.label}</option>`).join("") +
              `<option value="uploaded">${name}</option>`;
            document.getElementById("fontUploadLabel").textContent = name;
            updateState({ uploadedFontName: name }, "Local font loaded for this session.");
          } catch (error) {
            notice.textContent = "The selected font could not be loaded.";

      document.getElementById("presetSelect").addEventListener("change", (event) => {

        input.addEventListener("input", (event) => {

      document.getElementById("exportFormat").addEventListener("change", syncExportControls);

      document.getElementById("reset").addEventListener("click", () => {

        syncControls();

      document.getElementById("fitView").addEventListener("click", () => {
